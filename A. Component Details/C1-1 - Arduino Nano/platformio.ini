; ─────────────────────────────────────────────────────────────────────────────
; Arduino Nano  –  SPI ADC Slave
; Board: ATmega328P (Arduino Nano)
;
; Environments:
;   nanoatmega328       – Nano with original STK500v1 bootloader (most clones)
;   nanoatmega328new    – Nano with newer Optiboot bootloader (genuine post-2018)
;   nanoatmega328_debug – Same as nanoatmega328 but with Serial debug output
;
; If upload fails, try the other bootloader environment.
;
; Compile:   pio run -e nanoatmega328
; Upload:    pio run -e nanoatmega328 --target upload
; Monitor:   pio device monitor            (debug env only)
; ─────────────────────────────────────────────────────────────────────────────

[platformio]
default_envs = nanoatmega328

; ── Shared settings ───────────────────────────────────────────────────────────
[env_base]
platform       = atmelavr
framework      = arduino
monitor_speed  = 115200
upload_port    = COM5
monitor_port   = COM5

; ── Normal build (no serial output) ──────────────────────────────────────────
[env:nanoatmega328]
extends        = env_base
board          = nanoatmega328

[env:nanoatmega328new]
extends        = env_base
board          = nanoatmega328new

; ── Debug build – enables Serial.print() trace ────────────────────────────────
[env:nanoatmega328_debug]
extends        = env_base
board          = nanoatmega328
build_flags    = -DDEBUG_SERIAL
