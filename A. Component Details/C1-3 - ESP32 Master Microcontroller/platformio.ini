; ─────────────────────────────────────────────────────────────────────────────
; ESP32  –  SPI ADC Master
; Framework: ESP-IDF (not Arduino)
;
; Compile:   pio run
; Upload:    pio run --target upload
; Monitor:   pio device monitor
;
; Set upload_port / monitor_port below once you know your COM port.
; ─────────────────────────────────────────────────────────────────────────────

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = espidf
monitor_speed = 115200
; upload_port  = COMX   ; uncomment and set once you know the port
; monitor_port = COMX
